<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" role="img" aria-label="Verve MD — The marketing department for home service businesses.">
  <title>Verve MD — The marketing department for home service businesses</title>

  <defs>
    <radialGradient id="glow" cx="26%" cy="42%" r="58%">
      <stop offset="0" stop-color="#28b7a8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#28b7a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ember" cx="84%" cy="30%" r="34%">
      <stop offset="0" stop-color="#ef6a2c" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ef6a2c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Charcoal field + cinematic glows -->
  <rect width="1584" height="396" fill="#1f2624"/>
  <rect width="1584" height="396" fill="url(#glow)"/>
  <rect width="1584" height="396" fill="url(#ember)"/>

  <!-- Top hairline + mono eyebrow -->
  <line x1="96" y1="58" x2="1488" y2="58" stroke="#f3ecda" stroke-opacity="0.12" stroke-width="1"/>
  <text
    x="96" y="82"
    font-family="'Chivo Mono', ui-monospace, monospace"
    font-size="13" font-weight="500" letter-spacing="3"
    fill="#9aa09a">THE&#160;MARKETING&#160;DEPARTMENT&#160;FOR&#160;HOME&#160;SERVICE&#160;BUSINESSES</text>

  <!-- Wordmark -->
  <text
    x="92" y="216"
    font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-weight="600" font-size="104" letter-spacing="7"
    fill="#f3ecda">VERVE<tspan fill="#ef6a2c">·</tspan>MD</text>

  <!-- Positioning line -->
  <text
    x="96" y="276"
    font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-weight="500" font-size="30"
    fill="#28b7a8">Get found in AI search. Answer every call. Book more jobs.</text>

  <!-- Accent rule + orange square -->
  <rect x="96" y="306" width="64" height="3" fill="#1f9e93"/>
  <rect x="96" y="332" width="12" height="12" fill="#ef6a2c"/>
  <text
    x="124" y="343"
    font-family="'Chivo Mono', ui-monospace, monospace"
    font-size="13" font-weight="500" letter-spacing="2"
    fill="#9aa09a">VERVEMD.COM</text>

  <!-- Right column: capability pillars (crops out on company-page cover) -->
  <g transform="translate(1180, 112)">
    <text
      x="0" y="0"
      font-family="'Chivo Mono', ui-monospace, monospace"
      font-size="12" font-weight="500" letter-spacing="2.5"
      fill="#9aa09a">CAPABILITY&#160;COVERAGE</text>
    <g font-family="'Space Grotesk', Arial, sans-serif" font-size="22" font-weight="500" fill="#f3ecda">
      <text x="0" y="44">AI Search</text>
      <text x="0" y="82">Paid Media</text>
      <text x="0" y="120">Lead Capture</text>
      <text x="0" y="158">Reputation</text>
    </g>
    <line x1="-22" y1="22" x2="-22" y2="166" stroke="#1f9e93" stroke-width="2"/>
  </g>
</svg>
